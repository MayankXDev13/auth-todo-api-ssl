services:
  auth-todo-api:
    image: mayankxdev/auth-todo-api:latest
    container_name: auth-todo-api
    pull_policy: always
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - auth-todo-api-network
  nginx:
    image: nginx:latest
    restart: unless-stopped
    networks:
      - auth-todo-api-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth-todo-api

networks:
  auth-todo-api-network:
    driver: bridge
